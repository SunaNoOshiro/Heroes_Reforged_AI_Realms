<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>75. Content Report - Curated UI Mockup</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; width: 800px; height: 600px; overflow: hidden; background: #1a1410; }
  body { color: #e8d8b8; font-family: ui-monospace, Menlo, monospace; }
  svg { width: 800px; height: 600px; display: block; background: #1a1410; }
  .frame { fill: #2b1f15; stroke: #c9a14e; stroke-width: 2; }
  .panel { fill: #1f1610; stroke: #6b4f2a; stroke-width: 1; }
  .header { fill: #f0d590; font: 700 13px ui-monospace, Menlo, monospace; letter-spacing: .4px; }
  .row { fill: #d8c4a0; font: 11px ui-monospace, Menlo, monospace; }
  .info { fill: #7c9ce0; font: 700 11px ui-monospace, Menlo, monospace; }
  .button rect { fill: #4a3520; stroke: #c9a14e; }
  .button text { fill: #f0d590; font: 700 11px ui-monospace, Menlo, monospace; }
  .button-disabled rect { fill: #2a1f10; stroke: #5b4f2a; }
  .button-disabled text { fill: #6b5f4a; font: 700 11px ui-monospace, Menlo, monospace; }
</style>
</head>
<body data-screen="75-content-report" data-archetype="system-form-modal" data-curation="curated-pass-1">
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Content Report mockup">
  <rect x="14" y="14" width="772" height="572" class="frame"/>

  <text x="40" y="44" class="header" data-i18n="ui.report.title">REPORT THIS CONTENT</text>

  <rect x="32" y="60" width="736" height="52" class="panel"/>
  <text x="48" y="80" class="header" data-i18n="ui.report.target.title">TARGET</text>
  <text x="48" y="100" class="row">type: pack   id: example_pack   contentHash: 4c11..e2af</text>

  <rect x="32" y="124" width="736" height="120" class="panel"/>
  <text x="48" y="144" class="header" data-i18n="ui.report.reason.title">REASON</text>
  <text x="48" y="166" class="row" data-i18n="ui.report.reason.infringement">( ) Infringement (copyrighted material without permission)</text>
  <text x="48" y="184" class="row" data-i18n="ui.report.reason.harassment">( ) Harassment (targets a real person)</text>
  <text x="48" y="202" class="row" data-i18n="ui.report.reason.mature-without-rating">( ) Mature content without rating</text>
  <text x="48" y="220" class="row" data-i18n="ui.report.reason.malware">( ) Malware / unsafe asset</text>
  <text x="48" y="238" class="row" data-i18n="ui.report.reason.other">( ) Other (use notes)</text>

  <rect x="32" y="256" width="736" height="160" class="panel"/>
  <text x="48" y="276" class="header" data-i18n="ui.report.notes.label">NOTES (optional, max 1000 chars)</text>
  <rect x="48" y="290" width="704" height="100" fill="#0e0a06" stroke="#6b4f2a"/>
  <text x="56" y="310" class="row">[free-text input — sanitized via safeUserText(1000)]</text>
  <text x="48" y="408" class="row" data-i18n="ui.report.notes.limit">0 / 1000</text>

  <rect x="32" y="428" width="736" height="56" class="panel"/>
  <text x="48" y="448" class="row" data-i18n="ui.report.screenshot.attach">[ Attach screenshot (optional) ]</text>
  <text x="48" y="468" class="info" data-i18n="ui.report.queue.count">Queued reports: 0   (no network upload at v1)</text>

  <g class="button-disabled" data-action="contentReport.submit">
    <rect x="40" y="520" width="200" height="32" rx="4"/>
    <text x="140" y="540" text-anchor="middle" data-i18n="ui.report.submit-button">SUBMIT (NEEDS REASON)</text>
  </g>
  <g class="button" data-action="contentReport.cancel">
    <rect x="620" y="520" width="148" height="32" rx="4"/>
    <text x="694" y="540" text-anchor="middle" data-i18n="ui.report.cancel-button">CANCEL</text>
  </g>
</svg>
</body>
</html>
