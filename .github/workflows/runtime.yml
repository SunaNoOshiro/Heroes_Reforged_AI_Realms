name: Runtime Quality Gates

# Implementation Plan 16 (T12): staged-activation runtime CI.
#
# This workflow exists *now* so the day the first .ts file lands in
# src/, lint / typecheck / unit / fuzz steps activate automatically
# without further infra work. Each step runs only when its trigger
# files exist (file-existence guard via a small shell probe), so the
# workflow is a no-op while the repo is planning-first.
#
# The full game CI (engine fuzz, multiplayer determinism, etc.) is
# specified in tasks/mvp/01-engine-core/10-github-actions-ci.md;
# this file is the staged-activation companion to that task.

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: runtime-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  runtime:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      NPM_CONFIG_FUND: false
      NPM_CONFIG_PREFER_OFFLINE: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Detect runtime code
        id: probe
        shell: bash
        run: |
          if find src -type f \( -name "*.ts" -o -name "*.tsx" \) 2>/dev/null | grep -v -E "/(constants\.ts|smoke\.template\.test\.ts)$" | grep -q .; then
            echo "runtime_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "runtime_present=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f tsconfig.json ] || [ -f src/contracts/tsconfig.json ]; then
            echo "ts_project=true" >> "$GITHUB_OUTPUT"
          else
            echo "ts_project=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.probe.outputs.runtime_present == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        if: steps.probe.outputs.runtime_present == 'true'
        run: npm ci --prefer-offline --ignore-scripts --audit=false --no-fund

      - name: Lint
        if: steps.probe.outputs.runtime_present == 'true' && hashFiles('.eslintrc*', 'eslint.config.*') != ''
        run: npm run lint --if-present

      - name: Typecheck
        if: steps.probe.outputs.runtime_present == 'true' && steps.probe.outputs.ts_project == 'true'
        run: npm run typecheck --if-present

      - name: Unit tests (workspaces)
        if: steps.probe.outputs.runtime_present == 'true'
        run: npm test --workspaces --if-present

      - name: Security tests
        # Activates when tests/security/run.mjs lands.
        if: steps.probe.outputs.runtime_present == 'true' && hashFiles('tests/security/run.mjs') != ''
        run: npm run test:security --if-present

      - name: Golden state suite
        # Activates when src/engine/__tests__/golden.test.ts lands.
        if: steps.probe.outputs.runtime_present == 'true' && hashFiles('src/engine/__tests__/golden.test.ts') != ''
        run: npm run test:golden --if-present

      - name: Replay regression suite
        # Activates when src/engine/__tests__/replays.test.ts lands.
        if: steps.probe.outputs.runtime_present == 'true' && hashFiles('src/engine/__tests__/replays.test.ts') != ''
        run: npm run test:replays --if-present

      - name: UI smoke tests
        # Activates when any src/ui/**/*.smoke.test.ts lands. Note:
        # `vitest --browser` requires Playwright (or another browser
        # provider) installed in CI. If this step is the first to fail
        # after activation, install the browser provider per
        # tasks/mvp/02-tooling/01-ui-smoke-harness.md.
        if: steps.probe.outputs.runtime_present == 'true' && hashFiles('src/ui/**/*.smoke.test.ts') != ''
        run: npm run test:ui-smoke --if-present

      - name: Engine fuzz harness
        if: steps.probe.outputs.runtime_present == 'true' && hashFiles('src/engine/__tests__/fuzz.test.ts') != ''
        run: npm run test:fuzz --if-present

      - name: Engine throughput benchmark (non-gating)
        # Bench results are deliberately non-gating per
        # docs/architecture/testing/engine-throughput-slo.md and
        # docs/implementation-plans/15-testability-plan.md: micro-bench
        # numbers on shared CI runners are too noisy to fail PRs on.
        # continue-on-error keeps the run visible in the log without
        # blocking merges. Throughput regressions surface as a number a
        # human reviews. Activates automatically when the bench file
        # lands; until then, hashFiles returns "" and the step is
        # skipped.
        if: steps.probe.outputs.runtime_present == 'true' && hashFiles('src/engine/__tests__/throughput.bench.ts') != ''
        continue-on-error: true
        run: npm run test:bench:engine

      - name: Inactive workflow notice
        if: steps.probe.outputs.runtime_present != 'true'
        shell: bash
        run: |
          echo "No runtime .ts files in src/ — runtime CI is intentionally a no-op."
          echo "Activated automatically once mvp.01-engine-core lands."
