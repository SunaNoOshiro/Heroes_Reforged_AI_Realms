name: Validate Repo Contracts

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    env:
      NPM_CONFIG_FUND: false
      NPM_CONFIG_PREFER_OFFLINE: true

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        # `--ignore-scripts` is redundant given the committed `.npmrc`,
        # but kept explicit for grep-ability.
        run: npm ci --prefer-offline --ignore-scripts --audit=false --no-fund

      - name: Audit production dependencies
        # No-ops on an empty lockfile; activates the moment runtime
        # deps land per docs/architecture/dependency-policy.md.
        run: npm audit --omit=dev --audit-level=high

      - name: Validate
        run: npm run validate

      - name: Fail on stale task-registry.json
        # `npm run validate` regenerates tasks/task-registry.json. If
        # the tracked copy drifts from the regenerated one, the PR
        # must regenerate and commit before merge. Keeps the file
        # browsable on GitHub (audit I11 fix, 2026-04-22).
        run: git diff --exit-code tasks/task-registry.json

      - name: Test
        run: npm test
