name: secret-scan

# Source plan:
#   docs/implementation-plans/29-rate-limiting-and-secret-management-plan.md
#   — Critical Fix 2.
#
# A required check on `main`. On a finding: rotate at the provider,
# revoke the old value, purge from git history, write a short
# post-mortem. SECURITY.md owns the disclosure inbox.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
          report-format: sarif
          report-path: gitleaks.sarif
          redact: true
          no-banner: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: On finding — rotate / revoke / purge / post-mortem
        if: failure()
        run: |
          echo "::error::Secret-scan finding. Rotate at the provider, revoke the old value, purge from git history (git filter-repo), write a short post-mortem. See SECURITY.md for disclosure."
          exit 1

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
