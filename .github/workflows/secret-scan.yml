name: secret-scan

# Source plan:
#   docs/implementation-plans/29-rate-limiting-and-secret-management-plan.md
#   — Critical Fix 2.
#
# A required check on `main`. On a finding: rotate at the provider,
# revoke the old value, purge from git history, write a short
# post-mortem. SECURITY.md owns the disclosure inbox.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: On finding — rotate / revoke / purge / post-mortem
        if: failure() && steps.gitleaks.conclusion == 'failure'
        run: |
          sarif=$(ls -1 *.sarif 2>/dev/null | head -n 1 || true)
          if [ -z "$sarif" ]; then
            echo "::warning::gitleaks-action failed before producing a SARIF report — almost certainly a configuration or permissions error, not a secret finding. Inspect the action log."
            exit 1
          fi
          findings=$(jq '[.runs[].results[]] | length' "$sarif")
          if [ "$findings" -eq 0 ]; then
            echo "::warning::gitleaks step failed but $sarif reports zero findings — treat as a tooling issue, not a leak."
            exit 1
          fi
          echo "::error::Secret-scan: ${findings} finding(s). Rotate at the provider, revoke the old value, purge from git history (git filter-repo), write a short post-mortem. See SECURITY.md for disclosure."
          exit 1

      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: gitleaks-sarif
          path: "*.sarif"
          if-no-files-found: ignore
