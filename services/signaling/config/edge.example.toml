# Example reverse-proxy / edge config for the WebRTC signaling
# server. Authoritative doctrine:
#   docs/architecture/transport-security.md
#   docs/architecture/web-headers.md
#   docs/architecture/tls-observability.md
#
# This file is a documentation example; operators copy it into their
# Caddy / Fly.io / Nginx config layer, replace the placeholders with
# real values, and ship. The CI gates `npm run validate:transport`
# and `npm run validate:headers` parse this file as the canonical
# baseline.

[listener]
# WSS-only. Plain ws:// is rejected at the listener.
scheme = "wss"
address = "0.0.0.0:443"
# Reject plain ws:// upgrades unconditionally outside test env.
reject_plain_ws = true

[tls]
# TLS 1.2 floor. Weak-cipher fallback forbidden.
min_version = "TLSv1.2"
preferred_version = "TLSv1.3"
# Cipher allowlist per transport-security.md § 2.
ciphers = [
  "ECDHE-ECDSA-AES128-GCM-SHA256",
  "ECDHE-RSA-AES128-GCM-SHA256",
  "ECDHE-ECDSA-CHACHA20-POLY1305",
  "ECDHE-RSA-CHACHA20-POLY1305",
]
# Cert lifecycle: Let's Encrypt + auto-renew per § 6.
cert_provider = "letsencrypt"
auto_renew_days_before_expiry = 30
expiry_alert_days = 14

[headers]
# HSTS per transport-security.md § 3 / web-headers.md § 1.
"Strict-Transport-Security" = "max-age=63072000; includeSubDomains; preload"
"Referrer-Policy" = "no-referrer"
"X-Content-Type-Options" = "nosniff"
"Permissions-Policy" = "camera=(), microphone=(), geolocation=()"
# Origin allowlist per web-headers.md § 3. Replace with the
# canonical web origin in production. Wildcards are forbidden.
"Access-Control-Allow-Origin" = "https://heroes.example"

[origin_allowlist]
# Validate the WebSocket-upgrade Origin header against this list.
# Wildcard origins are forbidden; mismatch returns 403.
allowed = [
  "https://heroes.example",
]
reject_status = 403

[observability.tls]
# TLS-error log shape per docs/architecture/tls-observability.md.
# Bucketed IPs only; no UA tail; no SDP / cert content.
ipv4_bucket = "/24"
ipv6_bucket = "/64"
sink = "stdout-json"
per_bucket_rate_limit_per_60s = 1

# --- Edge-tier abuse defenses ----------------------------------------
# Plan 25 / Critical Fix 5. Authoritative doctrine:
#   docs/architecture/signaling-edge-defense.md

[edge_defense.per_prefix_socket_cap]
# Per-/24 IPv4 / per-/64 IPv6 concurrent open WebSocket cap.
# 9th upgrade is refused with HTTP 429.
ipv4_prefix = "/24"
ipv6_prefix = "/64"
max_concurrent_sockets = 8
refuse_status = 429

[edge_defense.upgrade_flood]
# Per-prefix upgrade-attempt ceiling per minute.
# Above this, the prefix is auto-added to the blocklist on
# sustained breach (see docs/architecture/signaling-edge-defense.md
# § 4 for the TTL ladder).
ipv4_prefix = "/24"
ipv6_prefix = "/64"
max_upgrades_per_minute = 30

[edge_defense.captcha_escalation]
# Activated when per-prefix CREATE_ROOM rate breaches 2× burst
# (10 in 60 s) for >= 60 s. The next CREATE_ROOM from the prefix
# returns ERROR { code: "captcha_required" } with a token; the
# lobby renders the verifier widget; the verified token is
# replayed on the retry. Off in dev (CAPTCHA_PROVIDER unset).
provider = "turnstile"  # also: "hcaptcha", "stub"
breach_window_sec = 60
breach_threshold_multiplier = 2.0

[edge_defense.blocklist]
# Time-bound blocklist; in-memory by default. Optional Redis
# backing for cross-restart memory.
ipv4_prefix = "/24"
ipv6_prefix = "/64"
ttl_minutes_first = 15
ttl_hours_repeat_within_1h = 24
ttl_days_repeat_within_24h = 7
backing = "in-memory"  # also: "redis"

# --- Health / metrics segregation ------------------------------------
# Plan 25 / Critical Fix 5. Authoritative doctrine:
#   docs/architecture/signaling-health-endpoints.md
#
# The public listener exposes only the WebSocket upgrade plus a
# bare 200 OK at any other path (LB liveness probe). /healthz and
# /metrics live on the admin port and require a bearer token.

[health.public]
server_header = "signaling"            # never the platform default
expose_healthz = false
expose_metrics = false
liveness_status = 200

[health.admin]
bind = "127.0.0.1:9091"                 # loopback only
require_auth = "Bearer:ADMIN_TOKEN"
paths = ["/healthz", "/metrics"]
