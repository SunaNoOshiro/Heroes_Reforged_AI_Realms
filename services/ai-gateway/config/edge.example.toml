# Example reverse-proxy / edge config for the AI gateway service.
# Authoritative doctrine:
#   docs/architecture/transport-security.md
#   docs/architecture/web-headers.md
#
# This file is a documentation example; operators copy it into their
# Caddy / Fly.io / Nginx config layer, replace the placeholders with
# real values, and ship. The CI gates `npm run validate:transport`
# and `npm run validate:headers` parse this file as the canonical
# baseline.

[listener]
# HTTPS-only. Plain http:// upstreams are forbidden.
scheme = "https"
address = "0.0.0.0:443"
reject_plain_http = true

[tls]
min_version = "TLSv1.2"
preferred_version = "TLSv1.3"
ciphers = [
  "ECDHE-ECDSA-AES128-GCM-SHA256",
  "ECDHE-RSA-AES128-GCM-SHA256",
  "ECDHE-ECDSA-CHACHA20-POLY1305",
  "ECDHE-RSA-CHACHA20-POLY1305",
]
cert_provider = "letsencrypt"
auto_renew_days_before_expiry = 30
expiry_alert_days = 14

[headers]
"Strict-Transport-Security" = "max-age=63072000; includeSubDomains; preload"
"Referrer-Policy" = "no-referrer"
"X-Content-Type-Options" = "nosniff"
"Permissions-Policy" = "camera=(), microphone=(), geolocation=()"
# CORS allowlist per web-headers.md § 3. Pinned to the canonical
# web origin; wildcards forbidden.
"Access-Control-Allow-Origin" = "https://heroes.example"
"Access-Control-Allow-Methods" = "GET, POST, OPTIONS"
"Access-Control-Allow-Headers" = "Content-Type, Authorization"

[upstream]
# The provider adapter refuses to attach to an http:// upstream
# regardless of environment. Replace with the canonical provider
# endpoint in production.
url = "https://provider.example"
verify_tls = true
