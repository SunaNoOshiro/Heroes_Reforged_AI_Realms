# Pinned coturn config for the M5 multiplayer TURN relay.
#
# Operators copy this into their coturn deploy, swap the
# `realm` and `static-auth-secret-file` values for production
# placeholders, and ship. The CI gate
# `npm run validate:turn-config` (deferred to
# tasks/phase-3/01-multiplayer/34-turn-server-hardening.md)
# parses this file as the canonical baseline.
#
# Authoritative doctrine:
#   docs/architecture/turn-credentials.md
#   services/turn/README.md
#   docs/architecture/multiplayer-security.md

# --- Authentication ----------------------------------------------------

# Long-term-credential mechanism; HMAC-SHA1 over `username` with the
# secret in static-auth-secret-file. The signaling server is the
# only issuer; clients never construct credentials locally.
lt-cred-mech
use-auth-secret
static-auth-secret-file=/etc/coturn/turn-shared-secret

# Realm pinned per-deploy; placeholder. Operators replace this with
# their canonical TURN host.
realm=heroes-reforged.example

# Stale-nonce window (seconds). Active call survives a single
# credential expiry as long as the client refreshed before the
# 5-minute credential TTL window closes.
stale-nonce=600

# --- Open-relay hardening ---------------------------------------------

# No TCP relay: TCP TURN allocations are how open relays leak SMTP /
# SSH / arbitrary TCP traffic. UDP only on the relay leg.
no-tcp-relay

# No loopback / multicast destinations.
no-loopback-peers
no-multicast-peers

# No CLI password; admin via Redis pub/sub channel only. The CI
# gate rejects any commit that reintroduces `cli-password`.
no-cli

# Denied peer IPs: RFC 1918 (private), RFC 6598 (CG-NAT),
# loopback, link-local, reserved, benchmark, multicast. IPv4 and
# IPv6 ranges. Without this, a TURN client can ask coturn to relay
# to its own internal AWS metadata endpoint or to a peer's
# private network.
#
# IPv4 ranges
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.0.2.0-192.0.2.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=198.51.100.0-198.51.100.255
denied-peer-ip=203.0.113.0-203.0.113.255
denied-peer-ip=224.0.0.0-239.255.255.255
denied-peer-ip=240.0.0.0-255.255.255.255
#
# IPv6 ranges
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=ff00::-ffff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# --- Listening ports --------------------------------------------------

# Standard TURN ports. The alt-listening-ports are explicitly
# zeroed so coturn does not bind on the legacy alternate ports.
listening-port=3478
tls-listening-port=5349
alt-listening-port=0
alt-tls-listening-port=0

# Allocation port range. 40 ports, sized for 100-room × 2-peer
# concurrent ceiling. The deploy firewall opens exactly this range.
min-port=49160
max-port=49200

# --- Quotas -----------------------------------------------------------

# Total concurrent allocations across the instance. 100 rooms × 2
# peers = 200 allocations under steady-state max load.
total-quota=200

# Per-credential concurrent allocations. A single (roomCode, peerId)
# scope opens at most 4 allocations (commands + heartbeat + chat
# DataChannels can multiplex; a 5th allocation is abuse).
user-quota=4

# Per-allocation bandwidth ceiling (≈ 1.5 Mbps). Sufficient for one
# match's command-stream + chat + heartbeat plus headroom for
# burst-mode SDP exchange. Above this, coturn starts dropping.
max-bps=1500000

# Per-instance bandwidth ceiling (300 Mbps). Hard upper bound on
# the bandwidth bill in the worst-case 200-allocation × 1.5 Mbps
# scenario.
bps-capacity=300000000

# --- TLS --------------------------------------------------------------

# Cipher allowlist: ECDHE-only, AES-GCM / ChaCha20-Poly1305 only.
# Matches the cipher allowlist in
# docs/architecture/transport-security.md § 2.
cipher-list=ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!eNULL:!RC4:!MD5:!DES:!3DES

# Cert files supplied by the deploy host (Let's Encrypt + auto-renew
# per docs/architecture/transport-security.md § 6). Operators set
# these to their issued cert paths in the production config.
cert=/etc/letsencrypt/live/turn.example/fullchain.pem
pkey=/etc/letsencrypt/live/turn.example/privkey.pem

# --- Logging ----------------------------------------------------------

# Structured JSON to stdout per services/turn/log/schema.json.
# Peer addresses are bucketed in the log writer (not coturn itself);
# this directive controls the file rotation only.
no-stdout-log
log-file=/var/log/coturn/turn.log
simple-log
